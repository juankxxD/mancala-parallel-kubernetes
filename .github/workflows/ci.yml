name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build-and-test-motor:
    name: Build & test motor (C++/OpenMP)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends cmake g++ libgomp1
      - name: Configure CMake
        working-directory: motor
        run: cmake -S src -B build -DCMAKE_BUILD_TYPE=Release
      - name: Build
        working-directory: motor
        run: cmake --build build --parallel
      - name: Run unit tests (ctest)
        working-directory: motor
        run: ctest --test-dir build --output-on-failure
      - name: Smoke bench (Alfa-Beta, 4 threads)
        working-directory: motor
        run: |
          OMP_NUM_THREADS=4 ./build/mancala_bench \
              --depth 8 --threads 4 \
              --positions tests/suite.txt

  test-backend:
    name: Test backend (pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - name: Install deps
        working-directory: backend
        run: pip install -r requirements.txt
      - name: Run pytest
        working-directory: backend
        run: pytest tests/ -v

  docker-images:
    name: Build & publish Docker images
    runs-on: ubuntu-latest
    needs: [build-and-test-motor, test-backend]
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3

      # En pull requests solo se construyen las imágenes (no hay credenciales de
      # push); en push a main/master se publican a GHCR con un tag inmutable.
      - name: Resolver prefijo de imágenes en minúsculas
        id: img
        run: echo "prefix=ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Iniciar sesión en GHCR
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Imagen del motor
        uses: docker/build-push-action@v6
        with:
          context: motor
          push: ${{ github.event_name == 'push' }}
          tags: ${{ steps.img.outputs.prefix }}/mancala-motor:${{ github.sha }}

      - name: Imagen del backend
        uses: docker/build-push-action@v6
        with:
          context: backend
          push: ${{ github.event_name == 'push' }}
          tags: ${{ steps.img.outputs.prefix }}/mancala-backend:${{ github.sha }}

      - name: Imagen del frontend
        uses: docker/build-push-action@v6
        with:
          context: frontend
          push: ${{ github.event_name == 'push' }}
          tags: ${{ steps.img.outputs.prefix }}/mancala-frontend:${{ github.sha }}

  # Análisis estático con SonarCloud declarado ÍNTEGRAMENTE en YAML (no por plugin
  # del marketplace y sin sonar-project.properties): toda la configuración del
  # proyecto se pasa como argumentos -Dsonar.* al scanner. Requiere SONAR_TOKEN
  # (y opcionalmente SONAR_HOST_URL) como Repository secrets.
  sonarqube:
    name: SonarQube Scan
    runs-on: ubuntu-latest
    needs: [build-and-test-motor, test-backend]
    if: github.event_name == 'push'
    # El token se expone a nivel de job para poder consultarlo en el `if` del
    # paso. Si SONAR_HOST_URL no está definido, se usa SonarCloud por defecto, de
    # modo que basta con configurar SONAR_TOKEN.
    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL || 'http://localhost:9090' }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      # Mientras no exista el secret SONAR_TOKEN el escaneo se salta y el job
      # queda en verde; en cuanto se configure, corre automáticamente.
      # AJUSTAR sonar.projectKey y sonar.organization a los valores reales del grupo.
      - name: SonarQube Scan
        if: ${{ env.SONAR_TOKEN != '' }}
        uses: sonarsource/sonarqube-scan-action@v2
        with:
          # OJO: cada token de `args` se separa por espacios, así que NO se pueden
          # usar valores con espacios (p. ej. projectName); ese nombre se configura
          # en la UI de SonarCloud.
          #
          # El motor en C++ NO se incluye en el análisis: SonarCloud requiere un
          # build-wrapper para C/C++ (su AutoScan falla sin él), lo cual queda
          # fuera del alcance de esta entrega. Se analizan el backend (Python) y
          # el frontend (JS). El C/C++ se deshabilita por suffixes para que el
          # sensor CFamily no se ejecute.
          args: >
            -Dsonar.projectKey=BigBelial_Paralelas-AI-Final
            -Dsonar.projectVersion=0.2.0
            -Dsonar.sources=backend/app,frontend/public
            -Dsonar.tests=backend/tests
            -Dsonar.exclusions=**/build/**,**/node_modules/**,**/__pycache__/**,motor/**
            -Dsonar.c.file.suffixes=-
            -Dsonar.cpp.file.suffixes=-
            -Dsonar.objc.file.suffixes=-
            -Dsonar.sourceEncoding=UTF-8
      - name: Sonar omitido (sin SONAR_TOKEN)
        if: ${{ env.SONAR_TOKEN == '' }}
        run: echo "SONAR_TOKEN no está configurado; se omite el escaneo. Añádelo en Settings → Secrets para activarlo."
