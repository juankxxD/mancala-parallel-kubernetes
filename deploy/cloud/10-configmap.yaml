apiVersion: v1
kind: ConfigMap
metadata:
  name: mancala-config
  namespace: mancala
data:
  # OMP_NUM_THREADS moderado en la nube: los benchmarks comparan
  # escalado vertical (más hilos) vs. horizontal (más réplicas).
  OMP_NUM_THREADS: "2"
  MOTOR_PORT: "9000"
  MOTOR_WORKERS: "8"
  MOTOR_TIMEOUT_S: "60"
  DEFAULT_DEPTH: "12"
  # AJUSTAR al dominio real del frontend en producción.
  ALLOWED_ORIGINS: "http://35.226.170.26"
