apiVersion: apps/v1
kind: Deployment
metadata:
  name: motor
  namespace: mancala
  labels:
    app: motor
    tier: engine
spec:
  replicas: 2
  selector:
    matchLabels:
      app: motor
  template:
    metadata:
      labels:
        app: motor
    spec:
      containers:
        - name: motor
          image: mancala-motor:dev
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 9000
          env:
            - name: OMP_NUM_THREADS
              valueFrom:
                configMapKeyRef:
                  name: mancala-config
                  key: OMP_NUM_THREADS
            - name: MOTOR_PORT
              valueFrom:
                configMapKeyRef:
                  name: mancala-config
                  key: MOTOR_PORT
            - name: MOTOR_WORKERS
              valueFrom:
                configMapKeyRef:
                  name: mancala-config
                  key: MOTOR_WORKERS
          resources:
            requests:
              cpu: "500m"
              memory: "128Mi"
            limits:
              cpu: "2000m"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 1
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: motor-svc
  namespace: mancala
spec:
  type: ClusterIP
  selector:
    app: motor
  ports:
    - name: http
      port: 9000
      targetPort: http
