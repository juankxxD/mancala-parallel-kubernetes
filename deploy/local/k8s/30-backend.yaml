apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: mancala
  labels:
    app: backend
    tier: api
spec:
  replicas: 3   # >= 3 réplicas exigidas por la rúbrica
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: mancala-backend:dev
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8000
          env:
            - name: MOTOR_HOST
              value: "motor-svc"
            - name: MOTOR_PORT
              valueFrom:
                configMapKeyRef:
                  name: mancala-config
                  key: MOTOR_PORT
            - name: MOTOR_TIMEOUT_S
              valueFrom:
                configMapKeyRef:
                  name: mancala-config
                  key: MOTOR_TIMEOUT_S
            - name: ALLOWED_ORIGINS
              valueFrom:
                configMapKeyRef:
                  name: mancala-config
                  key: ALLOWED_ORIGINS
            - name: OMP_NUM_THREADS
              valueFrom:
                configMapKeyRef:
                  name: mancala-config
                  key: OMP_NUM_THREADS
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 1
            periodSeconds: 5
            failureThreshold: 6
---
apiVersion: v1
kind: Service
metadata:
  name: backend-svc
  namespace: mancala
spec:
  type: NodePort
  selector:
    app: backend
  ports:
    - name: http
      port: 8000
      targetPort: http
      nodePort: 30080
