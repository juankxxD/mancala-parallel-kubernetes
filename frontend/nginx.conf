server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Reenvía las llamadas al backend (ClusterIP interno del cluster).
    # El browser llama a /api/move → nginx hace proxy a backend-svc:8000/move.
    location /api/ {
        proxy_pass http://backend-svc:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Dev: NO cachear estáticos (en producción usar tags inmutables + max-age).
    location ~* \.(?:css|js|svg|woff2?|png|jpg|html)$ {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        expires 0;
    }
}